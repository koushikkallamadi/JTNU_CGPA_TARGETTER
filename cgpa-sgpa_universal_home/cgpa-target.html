<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CGPA Target Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <br />
    <br />

    <link rel="stylesheet" href="cgpa-target.css" />
  </head>
  <body>
    <header class="hero">
      <h1>CGPA Target → Required SGPA</h1>
      <p>
        Choose your regulation to calculate the SGPA required to reach your
        target CGPA.
      </p>
    </header>

    <div class="container">
      <select id="regulationSelect">
        <option value="">Choose Regulation</option>
        <option value="R23">R23</option>
        <option value="R22">R22</option>
        <option value="R20">R20</option>
        <option value="R18">R18</option>
      </select>

      <button id="continueBtn">Continue</button>
    </div>

    <script src="cgpa-target.js"></script>
  </body>
</html>
